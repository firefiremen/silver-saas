<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>订阅成功</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); text-align: center; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        p { color: #888; font-size: 14px; margin-bottom: 24px; }
        a { display: inline-block; padding: 10px 24px; background: #222; color: white; border-radius: 8px; text-decoration: none; font-size: 14px; }
        a:hover { background: #444; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>订阅成功！</h1>
        <p>价格触达目标时，我们会立即发邮件通知你。</p>
        <a href="/">继续添加</a>
    </div>
</body>
</html>
