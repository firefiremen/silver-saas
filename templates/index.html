<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银价提醒服务</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: #333; margin-bottom: 6px; }
        .sub { color: #888; font-size: 14px; margin-bottom: 28px; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; margin-top: 16px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        input:focus { border-color: #666; }
        button { width: 100%; margin-top: 24px; padding: 12px; background: #222; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #444; }
        .footer { margin-top: 20px; text-align: center; font-size: 13px; color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>银价提醒服务</h1>
        <p class="sub">设置目标价格，触发时自动发邮件通知。当前已有 {{ count }} 人订阅。</p>
        <form action="/subscribe" method="POST">
            <label>邮箱地址</label>
            <input type="email" name="email" placeholder="your@email.com" required>
            <label>上方目标价（USD）— 涨到此价提醒</label>
            <input type="number" name="high" placeholder="例如：82.0" step="0.1" required>
            <label>下方目标价（USD）— 跌到此价提醒</label>
            <input type="number" name="low" placeholder="例如：78.0" step="0.1" required>
            <button type="submit">订阅提醒</button>
        </form>
        <p class="footer">银价数据每60秒更新一次</p>
    </div>
</body>
</html>
